<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="步态分析与预测系统 - 基于传感器数据的步态分析、异常检测和健康状况预测平台">
    <title>{% block title %}步态分析与预测系统{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👣</text></svg>">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.3.2/dist/echarts.min.js"></script>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-shoe-prints mr-2"></i>步态分析与预测系统
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item {% if request.path == url_for('index') %}active{% endif %}">
                        <a class="nav-link" href="{{ url_for('index') }}">
                            <i class="fas fa-home mr-1"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item {% if request.path == url_for('dashboard') %}active{% endif %}">
                        <a class="nav-link" href="{{ url_for('dashboard') }}">
                            <i class="fas fa-tachometer-alt mr-1"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item {% if request.path == url_for('analysis') %}active{% endif %}">
                        <a class="nav-link" href="{{ url_for('analysis') }}">
                            <i class="fas fa-chart-bar mr-1"></i> 数据分析
                        </a>
                    </li>
                    <li class="nav-item {% if request.path == url_for('prediction') %}active{% endif %}">
                        <a class="nav-link" href="{{ url_for('prediction') }}">
                            <i class="fas fa-brain mr-1"></i> 预测
                        </a>
                    </li>
                    <li class="nav-item {% if request.path == url_for('user_analysis') %}active{% endif %}">
                        <a class="nav-link" href="{{ url_for('user_analysis') }}">
                            <i class="fas fa-user-md mr-1"></i> 用户分析
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container mt-4 fade-in">
        {% block content %}{% endblock %}
    </div>

    <!-- 页脚 -->
    <footer class="footer py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-6 text-center text-md-left">
                    <h5 class="mb-3">步态分析与预测系统</h5>
                    <p class="text-muted small">基于传感器数据的步态分析、异常检测和健康状况预测平台</p>
                </div>
                <div class="col-md-6 text-center text-md-right">
                    <ul class="list-inline mb-0">
                        <li class="list-inline-item">
                            <a href="{{ url_for('index') }}" class="text-muted">
                                <i class="fas fa-home"></i>
                            </a>
                        </li>
                        <li class="list-inline-item">
                            <a href="{{ url_for('dashboard') }}" class="text-muted">
                                <i class="fas fa-tachometer-alt"></i>
                            </a>
                        </li>
                        <li class="list-inline-item">
                            <a href="{{ url_for('analysis') }}" class="text-muted">
                                <i class="fas fa-chart-bar"></i>
                            </a>
                        </li>
                        <li class="list-inline-item">
                            <a href="{{ url_for('prediction') }}" class="text-muted">
                                <i class="fas fa-brain"></i>
                            </a>
                        </li>
                    </ul>
                    <p class="mt-3 text-muted small">
                        &copy; 2025 步态分析与预测系统 | 毕业设计项目
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 全局脚本 -->
    <script>
        // 图表响应式调整
        window.addEventListener('resize', function() {
            const charts = document.querySelectorAll('[id$="-chart"]');
            charts.forEach(function(chartElement) {
                const chart = echarts.getInstanceByDom(chartElement);
                if (chart) {
                    chart.resize();
                }
            });
        });

        // 页面加载完成后初始化提示框
        $(function () {
            $('[data-toggle="tooltip"]').tooltip();
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
